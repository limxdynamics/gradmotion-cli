# Gradmotion CLI 发布流水线
# 推送 tag（如 v0.1.0）后自动发布到 GitHub Release 和 npm
# 需在 GitHub 仓库 Settings → Secrets and variables → Actions 中配置：
#   NPM_TOKEN：npm Automation Token（用于 npm publish）

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract binaries from archives for npm
        run: |
          cd dist
          # 解压各平台压缩包，提取裸二进制为 gm-<os>-<arch> 格式
          tar -xzf gm-darwin-amd64.tar.gz  && mv gm gm-darwin-amd64
          tar -xzf gm-darwin-arm64.tar.gz  && mv gm gm-darwin-arm64
          tar -xzf gm-linux-amd64.tar.gz   && mv gm gm-linux-amd64
          tar -xzf gm-linux-arm64.tar.gz   && mv gm gm-linux-arm64
          unzip -o gm-windows-amd64.zip    && mv gm.exe gm-windows-amd64.exe
          unzip -o gm-windows-arm64.zip    && mv gm.exe gm-windows-arm64.exe
          # 填充 npm/vendor，只复制裸二进制（不含压缩包）
          rm -rf ../npm/vendor && mkdir -p ../npm/vendor
          cp gm-darwin-amd64 gm-darwin-arm64 gm-linux-amd64 gm-linux-arm64 \
             gm-windows-amd64.exe gm-windows-arm64.exe ../npm/vendor/

      - name: Sync npm version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd npm && npm version ${VERSION} --no-git-tag-version --allow-same-version

      - name: Publish npm package
        # vendor 已由上一步填好，跳过 prepack 避免重复编译
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > npm/.npmrc
          cd npm && npm publish --access public --ignore-scripts
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
