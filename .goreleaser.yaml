version: 2

project_name: gradmotion-cli

builds:
  - id: gm
    main: ./cmd/gradmotion
    binary: gm
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}

archives:
  - id: default
    ids:
      - gm
    name_template: "{{ .Binary }}-{{ .Os }}-{{ .Arch }}"
    formats:
      - tar.gz
    wrap_in_directory: false
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  disable: true

changelog:
  disable: true

release:
  github:
    owner: limxdynamics
    name: gradmotion-cli
  extra_files:
    - glob: npm/skills/gm-cli/SKILL.md
